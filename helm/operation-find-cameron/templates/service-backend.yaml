apiVersion: v1
kind: Service
metadata:
  name: {{ include "operation-find-cameron.fullname" . }}-backend
  labels:
    {{- include "operation-find-cameron.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "operation-find-cameron.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
