apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "operation-find-cameron.fullname" . }}-backend
  labels:
    {{- include "operation-find-cameron.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "operation-find-cameron.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "operation-find-cameron.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            # ---- Non-secret config ----
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: PORT
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: DATABASE_URL
            - name: TARGET_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: TARGET_NAME
            - name: LAST_SEEN_DATE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: LAST_SEEN_DATE
            - name: CASE_START_NUMBER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: CASE_START_NUMBER
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: CORS_ORIGIN
            - name: RATE_LIMIT_WINDOW_MS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: RATE_LIMIT_WINDOW_MS
            - name: RATE_LIMIT_MAX_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: RATE_LIMIT_MAX_REQUESTS
            - name: POLL_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: POLL_URL
            - name: POLL_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "operation-find-cameron.fullname" . }}-config
                  key: POLL_INTERVAL_MS
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
