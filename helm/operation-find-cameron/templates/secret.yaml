apiVersion: v1
kind: Secret
metadata:
  name: {{ include "operation-find-cameron.fullname" . }}-secret
  labels:
    {{- include "operation-find-cameron.labels" . | nindent 4 }}
  annotations:
    # Override these via: --set backend.secrets.ANTHROPIC_API_KEY=<value>
    # or supply your own Secret and reference it in the deployment env.
    helm.sh/resource-policy: keep
type: Opaque
data:
  # Sensitive backend credentials — base64-encoded.
  # Empty-string defaults mean the pod starts but AI/AWS features are inactive
  # until real values are supplied.
  ANTHROPIC_API_KEY: {{ .Values.backend.secrets.ANTHROPIC_API_KEY | b64enc | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.backend.secrets.AWS_ACCESS_KEY_ID | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.backend.secrets.AWS_SECRET_ACCESS_KEY | b64enc | quote }}
  AWS_REGION: {{ .Values.backend.secrets.AWS_REGION | b64enc | quote }}
