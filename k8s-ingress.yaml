apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: witness-board-ingress
  namespace: ventures
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: witness-board-backend
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - apac.ventures.nuix.com
      secretName: apac-ventures-tls
  rules:
    - host: apac.ventures.nuix.com
      http:
        paths:
          # Frontend
          - path: /where_is_cameron(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: witness-board-frontend
                port:
                  number: 80
          # Backend API
          - path: /where_is_cameron/api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: witness-board-backend
                port:
                  number: 3001
          # WebSocket
          - path: /where_is_cameron/socket.io(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: witness-board-backend
                port:
                  number: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: witness-board-frontend
  namespace: ventures
spec:
  selector:
    app: witness-board-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: witness-board-backend
  namespace: ventures
spec:
  selector:
    app: witness-board-backend
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: witness-board-frontend
  namespace: ventures
spec:
  replicas: 1
  selector:
    matchLabels:
      app: witness-board-frontend
  template:
    metadata:
      labels:
        app: witness-board-frontend
    spec:
      containers:
        - name: frontend
          image: witness-board-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: BASE_PATH
              value: "/where_is_cameron"
            - name: VITE_API_URL
              value: "http://witness-board-backend:3001"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: witness-board-backend
  namespace: ventures
spec:
  replicas: 1
  selector:
    matchLabels:
      app: witness-board-backend
  template:
    metadata:
      labels:
        app: witness-board-backend
    spec:
      containers:
        - name: backend
          image: witness-board-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: witness-board-secrets
                  key: database-url
            - name: TARGET_NAME
              value: "Cameron Stiller"
            - name: LAST_SEEN_DATE
              value: "2026-06-26"
            - name: CASE_START_NUMBER
              value: "1000"
            - name: CORS_ORIGIN
              value: "https://apac.ventures.nuix.com"
            - name: RATE_LIMIT_WINDOW_MS
              value: "60000"
            - name: RATE_LIMIT_MAX_REQUESTS
              value: "10"
---
apiVersion: v1
kind: Secret
metadata:
  name: witness-board-secrets
  namespace: ventures
type: Opaque
stringData:
  database-url: "postgresql://witness:CHANGE_ME@postgres-service:5432/witness_board"
  aws-access-key-id: "CHANGE_ME"
  aws-secret-access-key: "CHANGE_ME"
